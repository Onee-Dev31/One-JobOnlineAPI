name: CI/CD Pipeline - OneeJob Backend

on:
  push:
    branches: [main, feature/security-audit]
  pull_request:
    branches: [main, feature/security-audit]

permissions:
  contents: read

jobs:
  # Stage 1: Build & Test  (parallel with 2, 3)
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore JobOnlineAPI.sln

      - name: Build (Release)
        run: dotnet build JobOnlineAPI.sln --no-restore --configuration Release

      - name: Run tests
        run: |
          TEST_PROJECTS=$(find . -name "*.Tests.csproj" | head -1)
          if [ -n "$TEST_PROJECTS" ]; then
            dotnet test JobOnlineAPI.sln --no-build --configuration Release --verbosity normal
          else
            echo "No test projects found - skipping"
          fi

  # Stage 2: Secret Scan  (parallel)
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan for leaked secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Stage 3: File Check  (parallel)
  file-check:
    name: File Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for backup/temp files
        run: |
          FILES=$(find . -not -path "./.git/*" -type f \( -name "*.bak" -o -name "*.tmp" \))
          if [ -n "$FILES" ]; then
            echo "FAIL: Found backup/temp files that should not be committed:"
            echo "$FILES"
            exit 1
          fi
          echo "PASS: No backup/temp files found"

      - name: Check appsettings.Production.json is NOT committed
        run: |
          if git ls-files | grep -q "appsettings.Production.json"; then
            echo "FAIL: appsettings.Production.json must not be committed (contains secrets)"
            exit 1
          fi
          echo "PASS: appsettings.Production.json is not tracked"

      - name: Check for .env files
        run: |
          if git ls-files | grep -qE "^\.env"; then
            echo "FAIL: .env files must not be committed"
            exit 1
          fi
          echo "PASS: No .env files committed"

  # Stage 4: Deploy to IIS  (push only)
  deploy:
    name: Deploy to IIS
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/security-audit') && github.event_name == 'push'
    needs: [build-and-test, secret-scan, file-check]
    runs-on: self-hosted

    env:
      PROJECT_PATH: 'JobOnlineAPI.csproj'
      PUBLISH_PATH: 'C:\ONEE-JOBS\publish\OneeJob-Backend'
      DEPLOY_PATH: 'C:\ONEE-JOBS\OneeJob-Backend'
      BACKUP_ROOT: 'C:\ONEE-JOBS\OneeJob-Backend_backup'
      APP_POOL_NAME: 'OneeJob-Backend'
      DOTNET_ROOT: 'C:\Program Files\dotnet'
      DOTNET_INSTALL_DIR: 'C:\Program Files\dotnet'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
        env:
          DOTNET_INSTALL_DIR: 'C:\Program Files\dotnet'

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build (Release)
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Copy appsettings.Production.json from server
        shell: powershell
        run: |
          $src = "C:\ONEE-JOBS\env\appsettings.Production.json"
          if (-not (Test-Path $src)) {
            throw "NOT FOUND: appsettings.Production.json at $src"
          }
          Copy-Item $src -Destination "appsettings.Production.json" -Force
          Write-Host "Copied appsettings.Production.json"

      - name: Publish application
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --output ${{ env.PUBLISH_PATH }} --no-build

      - name: Backup old deployment (keep 5 latest)
        shell: powershell
        run: |
          $backupRoot = "${{ env.BACKUP_ROOT }}"
          $deployPath = "${{ env.DEPLOY_PATH }}"

          if (-not (Test-Path $backupRoot)) {
            New-Item -ItemType Directory -Path $backupRoot -Force | Out-Null
          }

          if (Test-Path $deployPath) {
            $timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
            $backupPath = "$backupRoot\backup_$timestamp"
            New-Item -ItemType Directory -Path $backupPath | Out-Null
            Get-ChildItem -Path $deployPath | ForEach-Object {
              Copy-Item -Path $_.FullName -Destination $backupPath -Recurse -Force
            }
            Write-Host "Backup done: $backupPath"

            $old = Get-ChildItem $backupRoot | Sort-Object CreationTime -Descending | Select-Object -Skip 5
            foreach ($b in $old) {
              Remove-Item $b.FullName -Recurse -Force
              Write-Host "Removed old backup: $($b.Name)"
            }
          }

      - name: Stop App Pool
        shell: powershell
        run: |
          $result = & "C:\Windows\System32\inetsrv\appcmd.exe" stop apppool /apppool.name:"${{ env.APP_POOL_NAME }}" 2>&1
          Write-Host $result
          Start-Sleep -Seconds 3
          exit 0

      - name: Deploy new files
        shell: powershell
        run: |
          $deployPath = "${{ env.DEPLOY_PATH }}"
          $publishPath = "${{ env.PUBLISH_PATH }}"

          if (-not (Test-Path $deployPath)) {
            New-Item -ItemType Directory -Path $deployPath -Force | Out-Null
          }

          Get-ChildItem -Path $deployPath -Exclude "logs","App_Data" | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "$publishPath\*" -Destination $deployPath -Recurse -Force
          Write-Host "Deployed to $deployPath"

      - name: Start App Pool
        shell: powershell
        run: |
          $result = & "C:\Windows\System32\inetsrv\appcmd.exe" start apppool /apppool.name:"${{ env.APP_POOL_NAME }}" 2>&1
          Write-Host $result
          Write-Host "Deploy success"
