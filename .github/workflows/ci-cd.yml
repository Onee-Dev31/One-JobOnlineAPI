name: CI/CD Pipeline - OneeJob Backend

on:
  push:
    branches: [main, feature/security-audit]
  pull_request:
    branches: [main, feature/security-audit]

jobs:
  # Stage 1: Build & Test  (parallel with 2, 3)
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore JobOnlineAPI.sln

      - name: Build (Release)
        run: dotnet build JobOnlineAPI.sln --no-restore --configuration Release

      - name: Run tests
        run: |
          TEST_PROJECTS=$(find . -name "*.Tests.csproj" | head -1)
          if [ -n "$TEST_PROJECTS" ]; then
            dotnet test JobOnlineAPI.sln --no-build --configuration Release --verbosity normal
          else
            echo "No test projects found - skipping"
          fi

  # Stage 2: Secret Scan  (parallel)
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan for leaked secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Stage 3: File Check  (parallel)
  file-check:
    name: File Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for backup/temp files
        run: |
          FILES=$(find . -not -path "./.git/*" -type f \( -name "*.bak" -o -name "*.tmp" \))
          if [ -n "$FILES" ]; then
            echo "FAIL: Found backup/temp files that should not be committed:"
            echo "$FILES"
            exit 1
          fi
          echo "PASS: No backup/temp files found"

      - name: Check appsettings.Production.json is NOT committed
        run: |
          if git ls-files | grep -q "appsettings.Production.json"; then
            echo "FAIL: appsettings.Production.json must not be committed (contains secrets)"
            exit 1
          fi
          echo "PASS: appsettings.Production.json is not tracked"

      - name: Check for .env files
        run: |
          if git ls-files | grep -qE "^\.env"; then
            echo "FAIL: .env files must not be committed"
            exit 1
          fi
          echo "PASS: No .env files committed"

  # Stage 4: Deploy to IIS  (push only)
  deploy:
    name: Deploy to IIS
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/security-audit') && github.event_name == 'push'
    needs: [build-and-test, secret-scan, file-check]
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify .NET on server
        shell: powershell
        run: |
          $dotnetPaths = @(
            "C:\Program Files\dotnet\dotnet.exe",
            "C:\Program Files (x86)\dotnet\dotnet.exe"
          )
          $found = Get-Command dotnet -ErrorAction SilentlyContinue
          if (-not $found) {
            foreach ($p in $dotnetPaths) {
              if (Test-Path $p) {
                $env:PATH += ";$(Split-Path $p)"
                break
              }
            }
          }
          dotnet --version

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        shell: powershell
        run: dotnet restore JobOnlineAPI.sln

      - name: Copy appsettings.Production.json from server
        shell: powershell
        run: |
          $src = "C:\ONEE-JOBS\env\appsettings.Production.json"
          if (-not (Test-Path $src)) {
            throw "NOT FOUND: appsettings.Production.json at $src"
          }
          Copy-Item $src -Destination "appsettings.Production.json" -Force
          Write-Host "Copied appsettings.Production.json"

      - name: Publish application
        shell: powershell
        run: |
          dotnet publish JobOnlineAPI.sln `
            --configuration Release `
            --no-restore `
            --output ./publish
          if ($LASTEXITCODE -ne 0) { throw "Publish failed" }
          Write-Host "Publish completed"

      - name: Backup old deployment (keep 5 latest)
        shell: powershell
        run: |
          $deployPath = "C:\ONEE-JOBS\OneeJob-Backend"
          $backupRoot = "C:\ONEE-JOBS\OneeJob-Backend_backup"

          if (-not (Test-Path $backupRoot)) {
            New-Item -ItemType Directory -Path $backupRoot -Force | Out-Null
          }

          if (Test-Path $deployPath) {
            $timestamp  = Get-Date -Format "yyyyMMdd_HHmmss"
            $backupPath = "$backupRoot\backup_$timestamp"
            Copy-Item -Path $deployPath -Destination $backupPath -Recurse -Force
            Write-Host "Backed up to $backupPath"

            $old = Get-ChildItem $backupRoot | Sort-Object CreationTime -Descending | Select-Object -Skip 5
            foreach ($b in $old) {
              Remove-Item $b.FullName -Recurse -Force
              Write-Host "Removed old backup: $($b.Name)"
            }
          }

      - name: Take app offline (release DLL locks)
        shell: powershell
        run: |
          $deployPath = "C:\ONEE-JOBS\OneeJob-Backend"
          if (-not (Test-Path $deployPath)) {
            New-Item -ItemType Directory -Path $deployPath -Force | Out-Null
          }
          Set-Content -Path "$deployPath\app_offline.htm" -Value "Deploying new version, please wait..."
          Write-Host "app_offline.htm created - app is offline"
          Start-Sleep -Seconds 3

      - name: Stop IIS site and App Pool
        shell: powershell
        run: |
          Import-Module WebAdministration

          $siteName = "OneeJob-Backend"
          $appPool = (Get-Website -Name $siteName -ErrorAction SilentlyContinue).applicationPool

          $siteState = (Get-Website -Name $siteName -ErrorAction SilentlyContinue).State
          if ($siteState -eq "Started") {
            Stop-Website -Name $siteName
            Write-Host "Stopped IIS site: $siteName"
          }

          if ($appPool) {
            $poolState = (Get-WebAppPoolState -Name $appPool -ErrorAction SilentlyContinue).Value
            if ($poolState -eq "Started") {
              Stop-WebAppPool -Name $appPool
              Start-Sleep -Seconds 3
              Write-Host "Stopped App Pool: $appPool"
            }
          }

          Get-Process -Name "dotnet" -ErrorAction SilentlyContinue | ForEach-Object {
            $cmdLine = (Get-WmiObject Win32_Process -Filter "ProcessId=$($_.Id)").CommandLine
            if ($cmdLine -like "*OneeJob-Backend*") {
              $_ | Stop-Process -Force
              Write-Host "Killed dotnet process PID $($_.Id)"
            }
          }
          Start-Sleep -Seconds 2

      - name: Deploy new files
        shell: powershell
        run: |
          $deployPath = "C:\ONEE-JOBS\OneeJob-Backend"

          Get-ChildItem $deployPath -Exclude "logs","app_offline.htm" |
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

          Copy-Item -Path ".\publish\*" -Destination $deployPath -Recurse -Force
          Write-Host "Deployed to $deployPath"

      - name: Start IIS site and App Pool
        shell: powershell
        run: |
          Import-Module WebAdministration

          $siteName = "OneeJob-Backend"
          $appPool = (Get-Website -Name $siteName -ErrorAction SilentlyContinue).applicationPool

          if ($appPool) {
            Start-WebAppPool -Name $appPool
            Start-Sleep -Seconds 2
            Write-Host "Started App Pool: $appPool"
          }

          Start-Website -Name $siteName
          Write-Host "Started IIS site: $siteName"

          $offlineFile = "C:\ONEE-JOBS\OneeJob-Backend\app_offline.htm"
          if (Test-Path $offlineFile) {
            Remove-Item $offlineFile -Force
            Write-Host "Removed app_offline.htm - app is back online"
          }

          Start-Sleep -Seconds 2
          $finalState = (Get-Website -Name $siteName).State
          Write-Host "Site state: $finalState"
          if ($finalState -ne "Started") {
            throw "IIS site failed to start - state: $finalState"
          }
